  <style>
:root {
      --color-bg: #050608;
      --color-bg-deep: #020304;
      --color-surface: #0d1117;
      --color-text: #ffffff;
      --color-text-secondary: #d7f7f5;
      --color-text-muted: #8fded8;
      --color-accent-1: #18e0d0;
      --color-accent-2: #36f3e6;
      --color-accent-3: #0ea5a1;
      --color-glass-bg: rgba(255,255,255,0.05);
      --color-glass-border: rgba(24,224,208,0.20);
      --color-vignette: rgba(0,0,0,0.45);
      --font-display: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    
  
    .schema-shell { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; margin-top: 28px; }
    .schema-box {
      min-height: 250px; border: 2px solid rgba(24,224,208,.55); border-radius: 26px;
      background: rgba(255,255,255,.01); backdrop-filter: blur(8px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02), 0 12px 40px rgba(0,0,0,.18);
      padding: 22px 24px; display:flex; flex-direction:column; justify-content:flex-start;
    }
    .schema-title { color:#bffffa; font-size:1.12rem; font-weight:800; letter-spacing:.01em; margin-bottom: 18px; }
    .schema-list { display:flex; flex-direction:column; gap: 16px; }
    .schema-item { color:#ffffff; font-size:1rem; line-height:1.9; padding-left: 4px; }
    .schema-item::before { content:'- '; color:#36f3e6; font-weight:700; }
    .schema-rel { position:relative; margin-top: 22px; }
    .schema-note-wrap { display:grid; grid-template-columns: 1.25fr .9fr; gap: 26px; margin-top: 26px; }
    .schema-note, .schema-sql {
      border: 1px solid rgba(24,224,208,.22); border-radius: 24px; background: rgba(255,255,255,.018);
      padding: 24px 26px; line-height:1.82;
    }
    .schema-sql code, .schema-sql pre { white-space: pre-wrap; color:#d7f7f5; font-size:0.9rem; line-height:1.78; }
    .schema-badge { display:inline-block; border:1px solid rgba(24,224,208,.34); color:#bffffa; border-radius:999px; padding:6px 12px; font-size:.84rem; margin-bottom:10px; }
    @media (max-width: 1100px){ .schema-shell, .schema-note-wrap { grid-template-columns:1fr; } }

  
    .headline, .subline, .card, .schema-box, .schema-note, .schema-sql, table { text-wrap: pretty; }
    .schema-box { padding: 26px 28px; border-radius: 28px; background: rgba(255,255,255,.008); }
    .two-col, .three-col, .four-col { gap: 28px !important; }
    p { line-height: 1.72; }

  
    :root { --modern-shadow: 0 18px 60px rgba(0,0,0,.24); }
    body { background: radial-gradient(circle at top, #0a1016 0%, #050608 48%, #020304 100%); }
    .slide::after { background: radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.58) 100%); }
    .content { backdrop-filter: none; }
    .title-hero::before {
      inset: -26px -34px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(24,224,208,0.08), rgba(54,243,230,0.03));
      border: 1px solid rgba(54,243,230,0.22);
      box-shadow: var(--modern-shadow), inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .headline {
      letter-spacing: -0.03em;
      font-weight: 900;
      text-shadow: 0 12px 40px rgba(0,0,0,.28);
    }
    .subline { color:#dffcf9; opacity:.94; }
    .card, .schema-box, .schema-note, .schema-sql {
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02));
      border: 1px solid rgba(54,243,230,.18);
      box-shadow: var(--modern-shadow);
      backdrop-filter: blur(18px);
    }
    .card:hover, .schema-box:hover, .schema-note:hover, .schema-sql:hover {
      transform: translateY(-6px);
      transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      box-shadow: 0 24px 70px rgba(0,0,0,.30);
      border-color: rgba(54,243,230,.32);
    }
    .floating-orb.orb-a { width:220px; height:220px; top:10%; right:8%; opacity:.22; filter: blur(16px); }
    .floating-orb.orb-b { width:160px; height:160px; bottom:13%; left:8%; opacity:.18; filter: blur(14px); }
    .nav-controls {
      background: rgba(8,13,18,.55);
      border: 1px solid rgba(54,243,230,.18);
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
    }
    .nav-btn { background: rgba(24,224,208,0.12); box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
    .dot.active { box-shadow: 0 0 18px rgba(54,243,230,.65); }
    .kicker, .schema-badge {
      background: rgba(24,224,208,.08);
      border: 1px solid rgba(54,243,230,.18);
      border-radius: 999px;
      padding: 7px 14px;
      display: inline-flex;
      width: fit-content;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .schema-item::before { content:'• '; color:#36f3e6; }

  


    :root { --color-bg: #050608; --color-text: #ffffff; --glow-color-rgb: 24,224,208; --color-glass-bg: rgba(255,255,255,0.05); --color-glass-border: rgba(24,224,208,0.20); }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { background: var(--color-bg); margin: 0; }
    body { font-family: var(--font-body); color: var(--color-text); overflow: hidden; height: 100vh; width: 100vw; }
    .deck { width: 100vw; height: 100vh; position: relative; }
    .slide { position: absolute; inset: 0; background: var(--color-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transform:scale(0.96); transition:opacity .7s ease, transform .7s ease; pointer-events:none; overflow:hidden; }
    .slide.active { opacity:1; transform:scale(1); pointer-events:all; }
    .slide > .content { position:relative; z-index:2; width:100%; max-width:1180px; padding:clamp(1.6rem,3.4vw,3.4rem); }
    .nav-controls { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:24px; z-index:100; background: var(--color-glass-bg); backdrop-filter: blur(12px); padding:10px 20px; border-radius:999px; border:1px solid var(--color-glass-border); }
    .nav-btn { width:38px; height:38px; border:none; border-radius:50%; cursor:pointer; color:#fff; background:rgba(24,224,208,0.15); }
    .slide-dots { display:flex; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.18); cursor:pointer; transition:.25s; }
    .dot.active { background: var(--color-accent-1); transform:scale(1.25); }
    .slide-counter { font-size:.8rem; color:#b8fffb; min-width:48px; text-align:center; }
    .reveal { opacity:0; transform:translateY(16px); }
    .gradient-mesh { position:absolute; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .blob { position:absolute; border-radius:50%; filter:blur(80px); animation: float-slow 14s ease-in-out infinite; }
    .blob:nth-child(2){ animation: float-drift 18s ease-in-out infinite; }
    .blob:nth-child(3){ animation: float-slow 22s ease-in-out infinite reverse; }
    .blob:nth-child(4){ animation: float-drift 20s ease-in-out infinite reverse; }
    @keyframes float-slow { 0%{transform:translate(0,0) scale(1)} 25%{transform:translate(40px,-30px) scale(1.08)} 50%{transform:translate(-35px,30px) scale(.94)} 75%{transform:translate(25px,25px) scale(1.05)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes float-drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(-45px,-40px) scale(1.12)} 66%{transform:translate(35px,35px) scale(.92)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .slide::before { content:''; position:absolute; inset:0; z-index:1; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); background-size:256px 256px; opacity:.03; mix-blend-mode:overlay; pointer-events:none; }
    .slide::after { content:''; position:absolute; inset:0; z-index:1; background:radial-gradient(ellipse at center, transparent 52%, var(--color-vignette) 100%); pointer-events:none; }
    .glass { background:rgba(255,255,255,.045); border:1px solid rgba(24,224,208,.22); box-shadow:0 0 0 1px rgba(24,224,208,.05) inset; backdrop-filter:blur(10px); border-radius:22px; }
    .title-xl { font-size:clamp(2.4rem,5vw,4.6rem); line-height:.98; font-weight:900; letter-spacing:-.04em; }
    .title-lg { font-size:clamp(1.7rem,3.1vw,2.8rem); line-height:1.02; font-weight:800; letter-spacing:-.03em; }
    .kicker { font-size:.78rem; letter-spacing:.26em; text-transform:uppercase; color:#8ff9f0; }
    .text-glow { text-shadow:0 0 20px rgba(24,224,208,.34); }
    .hero-emoji { font-size:96px; margin-bottom:14px; animation:float 3s ease-in-out infinite; }
    .small { font-size:.9rem; line-height:1.62; }
    .tiny { font-size:.78rem; line-height:1.28; }
    .compact-grid { display:grid; gap:22px; }
    .two-col { display:grid; grid-template-columns:1.02fr .98fr; gap:24px; }
    .three-col { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
    .four-col { display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
    .list-clean { margin:0; padding-left:1.1rem; }
    .list-clean li { margin:.74rem 0; line-height: 1.7; }
    table { width:100%; border-collapse:separate; border-spacing:0; font-size:.88rem; }
    th, td { border:1px solid rgba(24,224,208,.14); padding:18px 18px; vertical-align:top; line-height:1.68; }
    th { color:#bffffa; text-align:left; background:rgba(24,224,208,.08); }
    .particle-canvas, .particle-canvas-ambient { position:absolute; inset:0; z-index:1; }

    .title-hero { position: relative; }
    .title-hero::before {
      content: "";
      position: absolute;
      inset: -18px -26px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(24,224,208,0.12), rgba(54,243,230,0.06));
      border: 1px solid rgba(24,224,208,0.18);
      filter: blur(0px);
      z-index: -1;
      animation: heroPulse 5.5s ease-in-out infinite;
    }
    .floating-orb {
      position:absolute; border-radius:9999px; filter: blur(10px); opacity:.18; z-index:1;
      animation: orbDrift 9s ease-in-out infinite;
    }
    .floating-orb.orb-a { width:180px; height:180px; top:14%; right:10%; background: rgba(24,224,208,.38); }
    .floating-orb.orb-b { width:120px; height:120px; bottom:18%; left:9%; background: rgba(54,243,230,.30); animation-duration: 11s; }
    .slide-hero-title { animation: titleFloat 4.2s ease-in-out infinite; }
    .slide-hero-subtitle { animation: subtitleGlow 3.6s ease-in-out infinite; }
    @keyframes heroPulse { 0%,100% { transform: scale(1); box-shadow: 0 0 0 rgba(24,224,208,0.0);} 50% { transform: scale(1.018); box-shadow: 0 0 38px rgba(24,224,208,0.12);} }
    @keyframes orbDrift { 0%,100% { transform: translate(0,0) scale(1);} 50% { transform: translate(18px,-22px) scale(1.08);} }
    @keyframes titleFloat { 0%,100% { transform: translateY(0px);} 50% { transform: translateY(-6px);} }
    @keyframes subtitleGlow { 0%,100% { opacity:.9; text-shadow: 0 0 0 rgba(24,224,208,0);} 50% { opacity:1; text-shadow: 0 0 22px rgba(24,224,208,.22);} }

    @media (max-width: 900px){ .two-col,.three-col,.four-col{ grid-template-columns:1fr; } }
  
  </style>
</head>

  <script type="text/babel">
    const initialDeck = "<div class=\"deck\">\n\n  <section class=\"slide active\" data-slide=\"1\">\n    <div class=\"floating-orb orb-a\"></div>\n    <div class=\"floating-orb orb-b\"></div>\n    <div class=\"gradient-mesh\">\n      <div class=\"blob\" style=\"width:420px;height:420px;top:-90px;right:-80px;background:#18e0d0;opacity:.14\"></div>\n      <div class=\"blob\" style=\"width:280px;height:280px;bottom:-70px;left:-60px;background:#36f3e6;opacity:.12\"></div>\n      <div class=\"blob\" style=\"width:220px;height:220px;top:38%;left:12%;background:#0ea5a1;opacity:.10\"></div>\n      <div class=\"blob\" style=\"width:180px;height:180px;bottom:18%;right:15%;background:#18e0d0;opacity:.09\"></div>\n    </div>\n    <canvas class=\"particle-canvas\"></canvas>\n    <div class=\"content text-center title-hero\">\n      <div class=\"hero-emoji reveal\">\ud83c\udfe6</div>\n      <div class=\"kicker reveal\">Professor: Eduardo Savino Gomes \u00b7 Authors: Fabiana \u26a1\ufe0f Campanari; Pedro Vyctor Almeida \u00b7 Location: S\u00e3o Paulo</div>\n      <h1 class=\"title-xl text-glow reveal\" style=\"margin:.5rem 0 1rem 0;\">AI Incidents in Financial Services</h1>\n      <p class=\"reveal\" style=\"font-size:1.15rem;max-width:900px;margin:0 auto;color:#dffdfb;\">An\u00e1lise de vi\u00e9s algor\u00edtmico, risco operacional, modelagem preditiva, governan\u00e7a de IA, API RESTful e dashboard integrado consumindo a pr\u00f3pria API do projeto.</p>\n    </div>\n  </section>\n\n  <section class=\"slide\" data-slide=\"2\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-70px;right:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;left:-40px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Estrutura</div><h2 class=\"title-lg reveal\" style=\"margin:.3rem 0 1rem 0;\">Fluxo completo do conte\u00fado</h2><div class=\"three-col\"><div class=\"glass reveal\" style=\"padding:18px;\"><h3>1\u20134</h3><p class=\"small\">Introdu\u00e7\u00e3o, objetivos, quest\u00f5es de pesquisa, contexto da fonte AIID e metodologia CRISP-DM.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>5\u201310</h3><p class=\"small\">Base tratada, infer\u00eancia sem\u00e2ntica, hip\u00f3teses, estat\u00edstica, ML, banco relacional, API e dashboard.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>11\u201319</h3><p class=\"small\">Arquitetura MLOps, notebooks, resultados consolidados, limita\u00e7\u00f5es, execu\u00e7\u00e3o, depend\u00eancias, conclus\u00e3o e refer\u00eancias.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"3\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:330px;height:330px;top:-80px;right:-70px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:210px;height:210px;bottom:-60px;left:-40px;background:#0ea5a1;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Introdu\u00e7\u00e3o</div><h2 class=\"title-lg reveal\">Contextualiza\u00e7\u00e3o do problema</h2><div class=\"two-col\" style=\"margin-top:18px;\"><div class=\"glass reveal\" style=\"padding:22px;\"><p class=\"small\">O setor financeiro ampliou rapidamente o uso de IA em <b>credit scoring</b>, detec\u00e7\u00e3o de fraude, negocia\u00e7\u00e3o algor\u00edtmica, avalia\u00e7\u00e3o de risco, automa\u00e7\u00e3o de atendimento e apoio \u00e0 conformidade. Isso aumenta efici\u00eancia, mas cria novos vetores de risco em um ambiente altamente regulado.</p><p class=\"small\">Falhas de IA nesse contexto n\u00e3o geram apenas perda t\u00e9cnica: podem causar dano reputacional, discrimina\u00e7\u00e3o, perdas operacionais, questionamentos regulat\u00f3rios e revis\u00e3o de pol\u00edticas internas.</p></div><div class=\"glass reveal\" style=\"padding:22px;\"><p class=\"small\">O projeto parte de incidentes reais do <b>AI Incident Database</b> filtrados para servi\u00e7os financeiros e transforma esse material em base anal\u00edtica estruturada para estat\u00edstica, ML, banco relacional, API e dashboard.</p><p class=\"small\">A l\u00f3gica central \u00e9 converter relatos p\u00fablicos heterog\u00eaneos em um pipeline anal\u00edtico integrado e reproduz\u00edvel.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"4\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:280px;height:280px;top:-60px;left:-50px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-70px;right:-40px;background:#18e0d0;opacity:.08\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Problema e relev\u00e2ncia</div><h2 class=\"title-lg reveal\">O que o trabalho quer saber</h2><div class=\"three-col\" style=\"margin-top:18px;\"><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Pergunta 1</h3><p class=\"small\">Existem padr\u00f5es sistem\u00e1ticos de concentra\u00e7\u00e3o de incidentes em certos tipos de aplica\u00e7\u00e3o financeira?</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Pergunta 2</h3><p class=\"small\">Certos segmentos de clientes s\u00e3o mais afetados por vi\u00e9s algor\u00edtmico?</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Pergunta 3</h3><p class=\"small\">A resposta regulat\u00f3ria acompanha adequadamente a gravidade dos incidentes?</p></div></div><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Pergunta 4</h3><p class=\"small\">Os atributos derivados permitem construir modelos preditivos minimamente \u00fateis para apoio \u00e0 gest\u00e3o de risco?</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Relev\u00e2ncia pr\u00e1tica</h3><p class=\"small\">Bancos e fintechs obt\u00eam leitura de risco operacional e reputacional; compliance prioriza auditorias; gestores de risco identificam exposi\u00e7\u00e3o por aplica\u00e7\u00e3o; reguladores observam padr\u00f5es; times de produto entendem fatores de risco no uso de IA.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"5\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-80px;right:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-50px;left:-50px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Objetivos</div><h2 class=\"title-lg reveal\">Objetivo geral e objetivos espec\u00edficos</h2><div class=\"glass reveal\" style=\"padding:22px;margin-top:16px;\"><p class=\"small\">Objetivo geral: avaliar, com base em dados estruturados de incidentes de IA no setor financeiro, se h\u00e1 padr\u00f5es relevantes de vi\u00e9s algor\u00edtmico, risco operacional e governan\u00e7a, produzindo evid\u00eancias \u00fateis para an\u00e1lise, monitoramento e suporte \u00e0 decis\u00e3o.</p></div><div class=\"four-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">1. Identificar incidentes de IA ligados a servi\u00e7os financeiros.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">2. Estruturar e enriquecer os dados com vari\u00e1veis derivadas de interesse anal\u00edtico.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">3. Avaliar hip\u00f3teses estat\u00edsticas sobre concentra\u00e7\u00e3o, vi\u00e9s, severidade e regula\u00e7\u00e3o.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">4. Construir modelos para severidade e investiga\u00e7\u00e3o regulat\u00f3ria, integrando tudo em notebooks, banco, API e dashboard.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"6\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-60px;left:-60px;background:#18e0d0;opacity:.07\"></div><div class=\"blob\" style=\"width:260px;height:260px;bottom:-80px;right:-70px;background:#0ea5a1;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Hip\u00f3teses</div><h2 class=\"title-lg reveal\">Hip\u00f3teses de pesquisa e abordagem</h2><div class=\"glass reveal\" style=\"padding:18px;margin-top:18px;\"><table><thead><tr><th>Hip\u00f3tese</th><th>Pergunta</th><th>Abordagem</th></tr></thead><tbody><tr><td>H1</td><td>Incidentes est\u00e3o concentrados em certos tipos de aplica\u00e7\u00e3o?</td><td>Qui-quadrado de ader\u00eancia</td></tr><tr><td>H2</td><td>Vi\u00e9s algor\u00edtmico afeta desproporcionalmente determinados segmentos?</td><td>Qui-quadrado de independ\u00eancia</td></tr><tr><td>H3</td><td>Incidentes mais severos geram maior resposta regulat\u00f3ria?</td><td>Qui-quadrado e regress\u00e3o log\u00edstica</td></tr><tr><td>H4</td><td>Existe tend\u00eancia temporal no volume de incidentes?</td><td>Correla\u00e7\u00e3o temporal e an\u00e1lise de tend\u00eancia</td></tr></tbody></table></div></div></section>\n\n  <section class=\"slide\" data-slide=\"7\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:330px;height:330px;top:-80px;right:-70px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:220px;height:220px;bottom:-50px;left:-30px;background:#18e0d0;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Fonte de dados</div><h2 class=\"title-lg reveal\">AI Incident Database e recorte financeiro</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:22px;\"><p class=\"small\">A fonte principal \u00e9 o <b>AI Incident Database (AIID)</b>, reposit\u00f3rio p\u00fablico de incidentes reais envolvendo sistemas de IA. O projeto utilizou portal oficial, API GraphQL e alternativa de dataset estruturado no Kaggle.</p><ul class=\"list-clean small\"><li>Portal oficial: incidentdatabase.ai</li><li>API oficial: incidentdatabase.ai/api/graphql</li><li>Alternativa estruturada: Kaggle</li></ul></div><div class=\"glass reveal\" style=\"padding:22px;\"><p class=\"small\">Como nem todo incidente pertence a finan\u00e7as, o projeto aplicou filtragem tem\u00e1tica por palavras-chave e contexto textual, buscando cr\u00e9dito, fraude, banco, fintech, mercado financeiro, investimentos, seguros, pagamentos, gest\u00e3o de risco e negocia\u00e7\u00e3o algor\u00edtmica.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"8\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:290px;height:290px;top:-60px;left:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;right:-40px;background:#36f3e6;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Base anal\u00edtica</div><h2 class=\"title-lg reveal\">Por que o CSV tratado virou a fonte principal</h2><div class=\"glass reveal\" style=\"padding:24px;margin-top:18px;\"><p class=\"small\">Embora a API oficial do AIID seja \u00fatil para aquisi\u00e7\u00e3o e atualiza\u00e7\u00e3o, a etapa anal\u00edtica depende fortemente da qualidade sem\u00e2ntica dos campos textuais. Como v\u00e1rias vari\u00e1veis derivadas foram inferidas a partir de <code>title</code>, <code>summary</code> e <code>text</code>, o projeto adotou o <b>CSV tratado e enriquecido</b> como principal fonte para as etapas posteriores, por oferecer maior consist\u00eancia e reprodutibilidade.</p><p class=\"small\">Essa decis\u00e3o metodol\u00f3gica \u00e9 central: a an\u00e1lise posterior n\u00e3o depende do dado bruto isolado, mas do dado enriquecido ap\u00f3s leitura contextual, padroniza\u00e7\u00e3o e infer\u00eancia sem\u00e2ntica.</p></div></div></section>\n\n  \n<section class=\"slide\" data-slide=\"9\">\n  <div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:360px;height:360px;top:-90px;right:-70px;background:#18e0d0;opacity:.10\"></div><div class=\"blob\" style=\"width:260px;height:260px;bottom:-70px;left:-40px;background:#36f3e6;opacity:.08\"></div></div>\n  <canvas class=\"particle-canvas-ambient\"></canvas>\n  <div class=\"content\">\n    <div class=\"kicker reveal\">S\u00edntese das 4 perguntas</div>\n    <h2 class=\"headline reveal\" style=\"max-width:15ch;\">O que os dados responderam</h2>\n    <p class=\"subline reveal\" style=\"max-width:980px; margin:0 0 1.2rem 0;\">Este slide traduz as quatro perguntas centrais do trabalho em respostas objetivas, usando apenas os resultados reportados na base anal\u00edtica e nos notebooks.</p>\n    <div class=\"grid three-col reveal\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px; margin-top:24px;\">\n      <div class=\"card reveal\">\n        <h3>1. H\u00e1 concentra\u00e7\u00e3o por tipo de aplica\u00e7\u00e3o?</h3>\n        <p>Sim. O trabalho parte da hip\u00f3tese de concentra\u00e7\u00e3o e a pr\u00f3pria an\u00e1lise foi estruturada para testar distribui\u00e7\u00e3o por aplica\u00e7\u00e3o com qui-quadrado de ader\u00eancia, indicando que os incidentes n\u00e3o aparecem de modo uniforme entre os usos de IA no setor financeiro.</p>\n      </div>\n      <div class=\"card reveal\">\n        <h3>2. O vi\u00e9s afeta mais alguns segmentos?</h3>\n        <p>Os dados sugerem que sim, e a investiga\u00e7\u00e3o foi desenhada exatamente para verificar despropor\u00e7\u00e3o entre segmentos de clientes por meio de teste de independ\u00eancia. A resposta do projeto \u00e9 que existe sinal anal\u00edtico de exposi\u00e7\u00e3o desigual, ainda que o volume da amostra pe\u00e7a cautela.</p>\n      </div>\n      <div class=\"card reveal\">\n        <h3>3. Maior severidade gera mais resposta regulat\u00f3ria?</h3>\n        <p>Em tese, era isso que o trabalho queria confirmar, mas o conjunto mostrou forte limita\u00e7\u00e3o emp\u00edrica: apenas 1 caso com <em>regulatory_investigation = 1</em> e distribui\u00e7\u00e3o extremamente desbalanceada. Assim, a arquitetura de teste foi implementada, por\u00e9m a evid\u00eancia final ficou fraca para afirmar rela\u00e7\u00e3o robusta.</p>\n      </div>\n      <div class=\"card reveal\">\n        <h3>4. D\u00e1 para prever risco com os atributos?</h3>\n        <p>A resposta honesta \u00e9: ainda n\u00e3o de forma confi\u00e1vel. O pipeline de ML foi constru\u00eddo corretamente, mas os resultados reportados foram F1-score 0.0000 para severidade e investiga\u00e7\u00e3o, com ROC-AUC de 0.0833 para severidade e nan para investiga\u00e7\u00e3o.</p>\n      </div>\n    </div>\n    <div class=\"card reveal\" style=\"margin-top:24px;\">\n      <h3>Leitura final do projeto</h3>\n      <p>Os dados foram suficientes para sustentar explora\u00e7\u00e3o, estrutura\u00e7\u00e3o anal\u00edtica, banco relacional, API e dashboard, mas insuficientes para transformar a modelagem preditiva em ferramenta decis\u00f3ria madura. Por isso, o trabalho se sustenta melhor como prova de conceito metodol\u00f3gica aplicada \u00e0 governan\u00e7a de IA em servi\u00e7os financeiros.</p>\n    </div>\n  </div>\n</section>\n<section class=\"slide\" data-slide=\"10\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-70px;right:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:250px;height:250px;bottom:-70px;left:-50px;background:#0ea5a1;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Limita\u00e7\u00f5es da fonte</div><h2 class=\"title-lg reveal\">Cuidados necess\u00e1rios com os dados p\u00fablicos</h2><div class=\"three-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:18px;\"><p class=\"small\">A base registra apenas incidentes que se tornaram p\u00fablicos, logo h\u00e1 forte depend\u00eancia de exposi\u00e7\u00e3o midi\u00e1tica.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><p class=\"small\">Existe vi\u00e9s de cobertura geogr\u00e1fica e midi\u00e1tica e nem sempre os valores financeiros est\u00e3o completos.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><p class=\"small\">Os campos textuais t\u00eam granularidade heterog\u00eanea e misturam casos de naturezas distintas, exigindo filtragem e engenharia de atributos.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"11\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:360px;height:360px;top:-90px;right:-80px;background:#18e0d0;opacity:.10\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;left:-40px;background:#36f3e6;opacity:.07\"></div></div><canvas class=\"particle-canvas-ambient\"></canvas><div class=\"content\"><div class=\"kicker reveal\">Metodologia</div><h2 class=\"title-lg reveal\">CRISP-DM aplicado ao projeto</h2><div class=\"glass reveal\" style=\"padding:20px;margin-top:16px;\"><table><thead><tr><th>Etapa</th><th>Aplica\u00e7\u00e3o no projeto</th></tr></thead><tbody><tr><td>Business Understanding</td><td>Defini\u00e7\u00e3o do problema, objetivos, escopo financeiro e hip\u00f3teses.</td></tr><tr><td>Data Understanding</td><td>Explora\u00e7\u00e3o da base, colunas dispon\u00edveis, leitura dos campos textuais e potencial anal\u00edtico.</td></tr><tr><td>Data Preparation</td><td>Filtragem do recorte financeiro, padroniza\u00e7\u00e3o, tratamento e cria\u00e7\u00e3o de vari\u00e1veis derivadas.</td></tr><tr><td>Modeling</td><td>Treinamento de modelos supervisionados para severidade e investiga\u00e7\u00e3o regulat\u00f3ria.</td></tr><tr><td>Evaluation</td><td>Testes de hip\u00f3teses, interpreta\u00e7\u00e3o estat\u00edstica e discuss\u00e3o da qualidade dos modelos.</td></tr><tr><td>Deployment</td><td>Banco SQLite, API Flask e concep\u00e7\u00e3o do dashboard interativo.</td></tr></tbody></table></div></div></section>\n\n  <section class=\"slide\" data-slide=\"12\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-70px;left:-50px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:250px;height:250px;bottom:-50px;right:-40px;background:#18e0d0;opacity:.08\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Pipeline</div><h2 class=\"title-lg reveal\">Fluxo resumido do pipeline</h2><div class=\"glass reveal\" style=\"padding:22px;margin-top:18px;\"><p class=\"small\">AIID / Kaggle / cache local \u2192 Notebook 1 de explora\u00e7\u00e3o e prepara\u00e7\u00e3o \u2192 CSV tratado + SQLite \u2192 Notebook 2 de estat\u00edstica e Notebook 3 de ML \u2192 modelos serializados \u2192 Notebook 4 de API Flask \u2192 dashboard e consumo externo.</p><p class=\"small\">Essa estrutura deixa claro que a base tratada abastece an\u00e1lise e modelagem, a API transforma artefatos em servi\u00e7o, e o dashboard n\u00e3o consulta notebooks diretamente: <b>ele consome a pr\u00f3pria API criada no projeto</b>.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"13\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-75px;right:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:220px;height:220px;bottom:-60px;left:-45px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Dados e prepara\u00e7\u00e3o</div><h2 class=\"title-lg reveal\">Como a base foi constru\u00edda</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><p class=\"small\">A base processada cont\u00e9m <b>31 incidentes</b> do setor financeiro, cobrindo <b>2003 a 2023</b>, e foi adotada como dataset principal para estat\u00edstica e modelagem.</p><ul class=\"list-clean tiny\"><li>Padroniza\u00e7\u00e3o de nomes de colunas</li><li>Extra\u00e7\u00e3o do ano a partir da data</li><li>Consolida\u00e7\u00e3o e limpeza dos campos textuais</li><li>Remo\u00e7\u00e3o de duplicidades</li></ul></div><div class=\"glass reveal\" style=\"padding:20px;\"><ul class=\"list-clean tiny\"><li>Filtragem tem\u00e1tica para o setor financeiro</li><li>Cria\u00e7\u00e3o de vari\u00e1veis categ\u00f3ricas derivadas</li><li>Cria\u00e7\u00e3o de flags de governan\u00e7a e regula\u00e7\u00e3o</li><li>Prepara\u00e7\u00e3o do CSV tratado para etapas posteriores</li></ul><p class=\"tiny\">Campos centrais: <code>incident_id</code>, <code>title</code>, <code>text</code>, <code>year</code>, <code>application_type</code>, <code>incident_type</code>, <code>customer_segment</code>, <code>severity_level</code> e flags regulat\u00f3rias.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"14\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:340px;height:340px;top:-80px;left:-65px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:210px;height:210px;bottom:-50px;right:-30px;background:#0ea5a1;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Infer\u00eancia sem\u00e2ntica</div><h2 class=\"title-lg reveal\">Texto narrativo transformado em estrutura anal\u00edtica</h2><div class=\"glass reveal\" style=\"padding:22px;margin-top:16px;\"><p class=\"small\">As vari\u00e1veis derivadas foram constru\u00eddas por infer\u00eancia heur\u00edstica sobre texto livre. No Notebook 1, o pipeline renomeia colunas, converte datas, extrai <code>year</code> e cria o campo consolidado <code>text</code> pela concatena\u00e7\u00e3o de <code>title</code> com <code>summary</code>, em min\u00fasculas, para facilitar busca de padr\u00f5es sem\u00e2nticos.</p><p class=\"small\">A correla\u00e7\u00e3o sem\u00e2ntica n\u00e3o foi feita com embeddings ou NLP avan\u00e7ado. O projeto usou correspond\u00eancia por palavras-chave e radicais textuais, comparando cada relato com listas de termos representativos de classes anal\u00edticas.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"15\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-60px;right:-55px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-70px;left:-50px;background:#18e0d0;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Vari\u00e1veis derivadas</div><h2 class=\"title-lg reveal\">Vari\u00e1veis derivadas centrais</h2><div class=\"glass reveal\" style=\"padding:18px;margin-top:16px;\"><p class=\"small\">Essas vari\u00e1veis funcionam como uma ponte entre texto narrativo e estrutura anal\u00edtica. Elas permitem transformar relatos heterog\u00eaneos de incidentes em um conjunto minimamente padronizado para infer\u00eancia estat\u00edstica e modelagem supervisionada.</p><table style=\"margin-top:14px;\"><thead><tr><th>Vari\u00e1vel</th><th>Tipo</th><th>Finalidade</th></tr></thead><tbody><tr><td>application_type</td><td>Categ\u00f3rica</td><td>Classificar o tipo de aplica\u00e7\u00e3o financeira.</td></tr><tr><td>incident_type</td><td>Categ\u00f3rica</td><td>Classificar a natureza do incidente.</td></tr><tr><td>customer_segment</td><td>Categ\u00f3rica</td><td>Identificar o grupo afetado.</td></tr><tr><td>severity_level</td><td>Ordinal</td><td>Representar a gravidade do incidente.</td></tr><tr><td>regulatory_investigation, fine_imposed, policy_change, third_party_audit</td><td>Flags bin\u00e1rias</td><td>Capturar respostas de governan\u00e7a e regula\u00e7\u00e3o.</td></tr></tbody></table></div></div></section>\n\n  <section class=\"slide\" data-slide=\"16\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:310px;height:310px;top:-70px;left:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-50px;right:-40px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Regras heur\u00edsticas</div><h2 class=\"title-lg reveal\">Exemplos de infer\u00eancia baseada em regras</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Application type e incident type</h3><ul class=\"list-clean tiny\"><li><b>credit scoring</b>: credit scor, loan, lending, mortgage</li><li><b>fraud detection</b>: fraud, aml, anti-money laundering</li><li><b>algorithmic trading</b>: trading, high-frequency, flash crash</li><li><b>risk assessment</b>: underwriting, insurance, risk assessment</li><li><b>algorithmic bias</b>: bias, discriminat, racial, unfair</li><li><b>operational failure</b>: crash, failure, outage, bug, error</li></ul></div><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Segmento, severidade e governan\u00e7a</h3><ul class=\"list-clean tiny\"><li><b>customer segment</b>: retail, corporate, SME, underserved</li><li><b>critical</b>: bankrupt, systemic, shutdown, billion</li><li><b>high</b>: investigation, lawsuit, fine, penalty</li><li><b>medium</b>: complaint, concern, review</li><li>Flags: investigation, inquiry, fine, sanction, policy change, audit</li></ul><p class=\"tiny\">A infer\u00eancia segue regras <code>if/elif</code> e, quando falta evid\u00eancia textual, utiliza categorias de fallback.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"17\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:290px;height:290px;top:-70px;right:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:220px;height:220px;bottom:-60px;left:-40px;background:#0ea5a1;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Limites da infer\u00eancia</div><h2 class=\"title-lg reveal\">Densidade sem\u00e2ntica e restri\u00e7\u00f5es metodol\u00f3gicas</h2><div class=\"glass reveal\" style=\"padding:22px;margin-top:16px;\"><p class=\"small\">A qualidade das vari\u00e1veis derivadas depende fortemente da densidade sem\u00e2ntica de <code>title</code>, <code>summary</code> e <code>text</code>. Quando esses campos v\u00eam pobres ou incompletos, a qualidade do enriquecimento diminui.</p><p class=\"small\">Por isso, a etapa deve ser entendida como heur\u00edstica interpret\u00e1vel e reproduz\u00edvel, mas n\u00e3o como compreens\u00e3o sem\u00e2ntica profunda. O README j\u00e1 indica como pr\u00f3ximo passo a evolu\u00e7\u00e3o para t\u00e9cnicas mais robustas de NLP, como embeddings e TF-IDF em escala de corpus.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"18\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:360px;height:360px;top:-90px;right:-70px;background:#18e0d0;opacity:.10\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-70px;left:-40px;background:#36f3e6;opacity:.08\"></div></div><canvas class=\"particle-canvas-ambient\"></canvas><div class=\"content\"><div class=\"kicker reveal\">Notebook 2</div><h2 class=\"title-lg reveal\">An\u00e1lise estat\u00edstica e resultados inferenciais</h2><div class=\"glass reveal\" style=\"padding:24px;margin-top:16px;\"><p class=\"small\">O Notebook 2 implementa a fase de <b>Evaluation</b> com foco em estat\u00edstica descritiva, an\u00e1lise bivariada e testes de hip\u00f3teses. Ele trabalha com o dataset financeiro j\u00e1 processado e organiza as evid\u00eancias em torno de quatro hip\u00f3teses centrais.</p><p class=\"small\">O panorama descritivo mostra <b>31 incidentes</b> entre <b>2003 e 2023</b>. Essa dimens\u00e3o permite explora\u00e7\u00e3o e infer\u00eancia limitada, mas imp\u00f5e restri\u00e7\u00f5es ao poder estat\u00edstico e \u00e0 estabilidade de conclus\u00f5es mais fortes.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"19\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-70px;left:-50px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;right:-50px;background:#18e0d0;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">H1 e H2</div><h2 class=\"title-lg reveal\">Concentra\u00e7\u00e3o e vi\u00e9s por segmento</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><h3>H1 \u2014 Tipo de aplica\u00e7\u00e3o</h3><p class=\"small\">Investiga se os incidentes est\u00e3o distribu\u00eddos uniformemente entre aplica\u00e7\u00f5es de IA no setor financeiro. Rejeitar a uniformidade sugere maior exposi\u00e7\u00e3o em certos usos, como cr\u00e9dito, fraude ou trading algor\u00edtmico, ajudando a direcionar governan\u00e7a mais intensiva.</p></div><div class=\"glass reveal\" style=\"padding:20px;\"><h3>H2 \u2014 Segmento de cliente</h3><p class=\"small\">Avalia se incidentes ligados a vi\u00e9s algor\u00edtmico afetam desproporcionalmente certos segmentos. A hip\u00f3tese conecta justi\u00e7a algor\u00edtmica a risco operacional, reputacional, regulat\u00f3rio e revis\u00e3o de modelos.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"20\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-65px;right:-45px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:235px;height:235px;bottom:-55px;left:-40px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">H3 e H4</div><h2 class=\"title-lg reveal\">Severidade, regula\u00e7\u00e3o e tend\u00eancia temporal</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><h3>H3 \u2014 Severidade e resposta regulat\u00f3ria</h3><p class=\"small\">Testa se incidentes mais graves tendem a se associar a investiga\u00e7\u00e3o regulat\u00f3ria. Aproxima estat\u00edstica de governan\u00e7a e conformidade e inclui regress\u00e3o log\u00edstica como complemento.</p></div><div class=\"glass reveal\" style=\"padding:20px;\"><h3>H4 \u2014 Tend\u00eancia temporal</h3><p class=\"small\">Verifica se existe tend\u00eancia temporal no volume de incidentes. A leitura exige cautela porque a s\u00e9rie \u00e9 curta e o n\u00famero total de casos \u00e9 pequeno para padr\u00f5es temporais robustos.</p></div></div><div class=\"glass reveal\" style=\"padding:18px;margin-top:16px;\"><p class=\"small\">A principal contribui\u00e7\u00e3o do Notebook 2 n\u00e3o \u00e9 apenas \u201cprovar\u201d hip\u00f3teses, mas estruturar o racioc\u00ednio anal\u00edtico do projeto em torno de distribui\u00e7\u00e3o de incidentes, assimetria entre segmentos, rela\u00e7\u00e3o entre severidade e governan\u00e7a e evolu\u00e7\u00e3o temporal observ\u00e1vel.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"21\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:330px;height:330px;top:-80px;left:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-60px;right:-45px;background:#0ea5a1;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Notebook 3</div><h2 class=\"title-lg reveal\">Modelagem de Machine Learning</h2><div class=\"glass reveal\" style=\"padding:22px;margin-top:16px;\"><p class=\"small\">O Notebook 3 implementa a fase de <b>Modeling</b> da CRISP-DM para duas tarefas: classifica\u00e7\u00e3o de severidade e predi\u00e7\u00e3o de investiga\u00e7\u00e3o regulat\u00f3ria.</p><div class=\"three-col\" style=\"margin-top:14px;\"><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>31 incidentes</b><br/>19 features iniciais<br/>sem missing principal</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>severity_level</b><br/>low 27, high 2, medium 1, critical 1</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>regulatory_investigation</b><br/>0 = 30, 1 = 1<br/>desbalanceamento extremo</p></div></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"22\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:310px;height:310px;top:-60px;right:-50px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-70px;left:-40px;background:#18e0d0;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Features e targets</div><h2 class=\"title-lg reveal\">Estrutura de modelagem</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Features selecionadas</h3><ul class=\"list-clean tiny\"><li>application_type</li><li>incident_type</li><li>customer_segment</li><li>year</li><li>regulatory_investigation</li><li>fine_imposed</li><li>policy_change</li><li>third_party_audit</li></ul><p class=\"tiny\">Ap\u00f3s One-Hot Encoding, o notebook registra <b>14 features</b>.</p></div><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Targets constru\u00eddos</h3><ul class=\"list-clean tiny\"><li><b>severity_binary</b>: 0 = low/medium, 1 = high/critical; distribui\u00e7\u00e3o 28 vs 3</li><li><b>severity_multiclass</b>: 0 low, 1 medium, 2 high, 3 critical; distribui\u00e7\u00e3o 27,1,2,1</li></ul><p class=\"tiny\">Na pr\u00e1tica, o trabalho depende principalmente da vers\u00e3o bin\u00e1ria, porque a multiclasse \u00e9 invi\u00e1vel com t\u00e3o poucos exemplos.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"23\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-80px;left:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;right:-40px;background:#36f3e6;opacity:.08\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Modelos e avalia\u00e7\u00e3o</div><h2 class=\"title-lg reveal\">Resultados reportados no notebook</h2><div class=\"three-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Algoritmos</h3><p class=\"small\">Random Forest, XGBoost e Logistic Regression como baseline.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Severidade bin\u00e1ria</h3><p class=\"small\">X = (31,14), y = (31,), baixa severidade 90,3%, alta 9,7%, ratio de desbalanceamento 9,33.</p></div><div class=\"glass reveal\" style=\"padding:18px;\"><h3>Recomenda\u00e7\u00f5es</h3><p class=\"small\">O pr\u00f3prio notebook recomenda class_weight, SMOTE e outras estrat\u00e9gias de balanceamento.</p></div></div><div class=\"glass reveal\" style=\"padding:18px;margin-top:16px;\"><table><thead><tr><th>Tarefa</th><th>Melhor modelo</th><th>F1-score</th><th>ROC-AUC</th></tr></thead><tbody><tr><td>Classificador de severidade</td><td>XGBoost</td><td>0.0000</td><td>0.0833</td></tr><tr><td>Preditor de investiga\u00e7\u00e3o regulat\u00f3ria</td><td>XGBoost</td><td>0.0000</td><td>nan</td></tr></tbody></table></div></div></section>\n\n  <section class=\"slide\" data-slide=\"24\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:340px;height:340px;top:-80px;right:-70px;background:#18e0d0;opacity:.10\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-60px;left:-40px;background:#0ea5a1;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Leitura correta</div><h2 class=\"title-lg reveal\">ML como prova de conceito metodol\u00f3gica</h2><div class=\"glass reveal\" style=\"padding:24px;margin-top:16px;\"><p class=\"small\">A interpreta\u00e7\u00e3o t\u00e9cnica correta \u00e9 que a modelagem, na forma atual, <b>n\u00e3o atingiu desempenho preditivo confi\u00e1vel</b>. Portanto, os modelos n\u00e3o devem ser apresentados como prontos para uso decis\u00f3rio ou como solu\u00e7\u00e3o robusta de produ\u00e7\u00e3o.</p><ul class=\"list-clean small\"><li>O pipeline de ML foi implementado com sucesso.</li><li>A engenharia de features e a serializa\u00e7\u00e3o dos modelos foram realizadas.</li><li>A avalia\u00e7\u00e3o quantitativa mostra que o dataset \u00e9 insuficiente para desempenho robusto.</li><li>O valor do Notebook 3 est\u00e1 na fase de Modeling da CRISP-DM, de forma did\u00e1tica, rastre\u00e1vel e integrada \u00e0 API.</li></ul></div></div></section>\n\n  <section class=\"slide\" data-slide=\"25\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-75px;left:-60px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-70px;right:-45px;background:#18e0d0;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Notebook 4</div><h2 class=\"title-lg reveal\">Banco de dados relacional e API RESTful</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Objetivo da API</h3><ul class=\"list-clean tiny\"><li>Consulta estruturada de incidentes</li><li>Acesso a estat\u00edsticas agregadas</li><li>Integra\u00e7\u00e3o com modelos preditivos</li><li>Consumo por dashboard ou sistemas externos</li></ul><p class=\"tiny\">O banco utilizado \u00e9 SQLite e o notebook confirma <b>31 incidentes</b> na base relacional.</p></div><div class=\"glass reveal\" style=\"padding:20px;\"><h3>Artefatos carregados</h3><ul class=\"list-clean tiny\"><li>severity_classifier.pkl</li><li>investigation_classifier.pkl</li><li>features_severity.pkl</li><li>features_investigation.pkl</li></ul><p class=\"tiny\">Os modelos esperam <b>14 features</b>, coerente com o Notebook 3.</p></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"26\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-70px;right:-50px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:235px;height:235px;bottom:-55px;left:-40px;background:#36f3e6;opacity:.07\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Endpoints</div><h2 class=\"title-lg reveal\">Camada de servi\u00e7o exposta pela API</h2><div class=\"glass reveal\" style=\"padding:20px;margin-top:16px;\"><div class=\"two-col\"><div><h3>Consulta de dados</h3><ul class=\"list-clean tiny\"><li>GET /api/incidents</li><li>GET /api/incidents/{id}</li><li>GET /api/stats/by-application</li><li>GET /api/stats/by-region</li><li>GET /api/stats/temporal</li><li>GET /api/stats/by-segment</li><li>GET /api/stats/governance</li></ul></div><div><h3>Predi\u00e7\u00f5es e docs</h3><ul class=\"list-clean tiny\"><li>POST /api/predict/severity</li><li>POST /api/predict/investigation</li><li>GET /</li></ul><p class=\"tiny\">A API converte artefatos anal\u00edticos em camada de servi\u00e7o reutiliz\u00e1vel, aproximando o projeto de uma arquitetura aplicada.</p></div></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"27\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:330px;height:330px;top:-85px;left:-70px;background:#18e0d0;opacity:.09\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-65px;right:-45px;background:#36f3e6;opacity:.08\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Dashboard</div><h2 class=\"title-lg reveal\">O dashboard consome a pr\u00f3pria API</h2><div class=\"glass reveal\" style=\"padding:24px;margin-top:16px;\"><p class=\"small\">O dashboard foi pensado como camada visual de consumo do projeto, permitindo que usu\u00e1rios n\u00e3o t\u00e9cnicos explorem incidentes, estat\u00edsticas agregadas e funcionalidades preditivas de modo interativo.</p><p class=\"small\"><b>Ponto essencial para a apresenta\u00e7\u00e3o oral:</b> a integra\u00e7\u00e3o prevista \u00e9 1) Notebook 1 gera a base tratada e o banco; 2) Notebook 3 gera modelos serializados; 3) Notebook 4 publica a API; 4) <b>o dashboard consome os endpoints da pr\u00f3pria API criada no projeto</b>.</p><div class=\"three-col\" style=\"margin-top:14px;\"><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">Vis\u00e3o geral de incidentes</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">Distribui\u00e7\u00e3o por aplica\u00e7\u00e3o e segmento</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\">Governan\u00e7a, resposta regulat\u00f3ria e formul\u00e1rios de predi\u00e7\u00e3o</p></div></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"28\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:300px;height:300px;top:-75px;right:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:230px;height:230px;bottom:-55px;left:-35px;background:#0ea5a1;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Arquitetura</div><h2 class=\"title-lg reveal\">Arquitetura do sistema e vis\u00e3o MLOps</h2><div class=\"glass reveal\" style=\"padding:18px;margin-top:16px;\"><table><thead><tr><th>Camada</th><th>Fun\u00e7\u00e3o</th></tr></thead><tbody><tr><td>Fonte de dados</td><td>Obten\u00e7\u00e3o e filtragem de incidentes.</td></tr><tr><td>An\u00e1lise estat\u00edstica</td><td>Testes de hip\u00f3teses e interpreta\u00e7\u00e3o.</td></tr><tr><td>Modelagem ML</td><td>Classifica\u00e7\u00e3o de severidade e investiga\u00e7\u00e3o.</td></tr><tr><td>Persist\u00eancia e servi\u00e7o</td><td>SQLite + Flask API.</td></tr><tr><td>Visualiza\u00e7\u00e3o</td><td>Dashboard interativo.</td></tr></tbody></table></div><div class=\"glass reveal\" style=\"padding:18px;margin-top:14px;\"><p class=\"small\">Na vers\u00e3o expandida, a arquitetura segue princ\u00edpios de MLOps moderno, separando data sources, ingestion, processing & enrichment, feature store, training pipeline, model registry, data warehouse, model store, inference API e presentation layer.</p></div></div></section>\n\n  <section class=\"slide\" data-slide=\"29\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-70px;left:-50px;background:#36f3e6;opacity:.08\"></div><div class=\"blob\" style=\"width:240px;height:240px;bottom:-60px;right:-40px;background:#18e0d0;opacity:.08\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Componentes</div><h2 class=\"title-lg reveal\">Papel de cada componente e roadmap</h2><div class=\"two-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:20px;\"><ul class=\"list-clean tiny\"><li><b>CSV tratado</b>: base principal das an\u00e1lises.</li><li><b>SQLite</b>: estrutura relacional para consulta.</li><li><b>Modelos serializados</b>: integra\u00e7\u00e3o com predi\u00e7\u00e3o.</li><li><b>API Flask</b>: camada de servi\u00e7o.</li><li><b>Dashboard</b>: camada de apresenta\u00e7\u00e3o.</li></ul></div><div class=\"glass reveal\" style=\"padding:20px;\"><ul class=\"list-clean tiny\"><li>Integra\u00e7\u00e3o futura com MLflow.</li><li>Automa\u00e7\u00e3o com Airflow.</li><li>Containeriza\u00e7\u00e3o com Docker.</li><li>Deploy em cloud.</li><li>Monitoramento de drift, performance e alertas.</li></ul></div></div></div></section>\n\n  <section class=\"slide\" data-slide=\"30\"><div class=\"gradient-mesh\"><div class=\"blob\" style=\"width:320px;height:320px;top:-80px;right:-60px;background:#18e0d0;opacity:.08\"></div><div class=\"blob\" style=\"width:220px;height:220px;bottom:-50px;left:-30px;background:#36f3e6;opacity:.06\"></div></div><div class=\"content\"><div class=\"kicker reveal\">Notebooks</div><h2 class=\"title-lg reveal\">Estrutura t\u00e9cnica dos notebooks</h2><div class=\"four-col\" style=\"margin-top:16px;\"><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>Notebook 1</b><br/>Aquisi\u00e7\u00e3o, limpeza, filtragem financeira, vari\u00e1veis derivadas, CSV tratado e SQLite.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>Notebook 2</b><br/>An\u00e1lise descritiva, testes H1\u2013H4, visualiza\u00e7\u00f5es e interpreta\u00e7\u00e3o para risco e governan\u00e7a.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>Notebook 3</b><br/>Features, encoding, targets, treino, avalia\u00e7\u00e3o e serializa\u00e7\u00e3o dos artefatos.</p></div><div class=\"glass reveal\" style=\"padding:16px;\"><p class=\"tiny\"><b>Notebook 4</b><br/>Conex\u00e3o com SQLite, carregamento de modelos, endpoints, testes de consumo e deploy window.initParticles = function(canvas, options){ if(!canvas) return; const ctx=canvas.getContext('2d'); const resize=()=>{ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }; resize(); window.addEventListener('resize', resize); const interactive = options.interactive !== false; const count = options.count || (interactive ? 42 : 16); let mx=-1000,my=-1000; const particles = Array.from({length:count},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32,size:Math.random()*2.2+.8,alpha:Math.random()*.32+.08})); if(interactive){ canvas.addEventListener('mousemove',(e)=>{ const rect=canvas.getBoundingClientRect(); mx=e.clientX-rect.left; my=e.clientY-rect.top; }); canvas.addEventListener('mouseleave',()=>{ mx=-1000; my=-1000; }); }
